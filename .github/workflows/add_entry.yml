name: add_entry

# Controls when the workflow will run
on:
  repository_dispatch:
    types: [add_entry]

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: checkout repo content
        uses: actions/checkout@v2
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: execute py script
        env:
          THIS_PAYLOAD: ${{ github.event.client_payload.data }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
        run: python add_mod.py
      
      - name: commit files
        run: |
          git config --global user.name 'rwqfsfasxc100'
          git config --global user.email '123430291+rwqfsfasxc100@users.noreply.github.com'
          git add -A
          git remote set-url --push origin https://rwqfsfasxc100:$GITHUB_TOKEN@github.com/rwqfsfasxc100/dv_update_database
          git diff-index --quiet HEAD || (git commit -a -m "updated logs" --allow-empty)
          
      - name: push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
